<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Pierrot</title>

    <!-- FAVICON — remplace le href par le chemin vers ton fichier logo
         Formats recommandés : .png 32×32px ou .ico
         Ex: <link rel="icon" href="assets/images/favicon.png" type="image/png"> -->
         
    <link rel="icon" href="assets/images/favicon.png" type="image/png">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

    <!-- PANNEAU IMAGES (moitié haute) -->
    <div class="panel panel-images" id="panelImages">
        <div class="scroll-content" id="scrollImages">
            <div class="grid" id="gridImages"></div>
        </div>
        <div class="fade-overlay fade-bottom" id="fadeBottom"></div>
    </div>

    <!-- PANNEAU LÉGENDES (moitié basse) -->
    <div class="panel panel-captions" id="panelCaptions">
        <div class="fade-overlay fade-top" id="fadeTop"></div>
        <div class="scroll-content" id="scrollCaptions">
            <div class="grid" id="gridCaptions"></div>
        </div>
    </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
